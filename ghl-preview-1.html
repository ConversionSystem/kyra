<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 960px; height: 540px;
  background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.glow {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.container {
  text-align: center; z-index: 1; padding: 60px;
}
.logo {
  font-size: 48px; margin-bottom: 8px;
}
h1 {
  font-size: 42px; font-weight: 700; color: #fff;
  margin-bottom: 16px; line-height: 1.1;
}
h1 span { color: #a78bfa; }
p {
  font-size: 20px; color: #a1a1aa; max-width: 600px;
  margin: 0 auto 40px; line-height: 1.5;
}
.badges {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}
.badge {
  background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3);
  border-radius: 24px; padding: 8px 20px; color: #c4b5fd;
  font-size: 14px; font-weight: 500;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="logo">🤖</div>
  <h1>AI Employees for <span>GoHighLevel</span></h1>
  <p>Autonomous AI that reads your CRM, responds to customers, manages your pipeline, and books appointments.</p>
  <div class="badges">
    <div class="badge">📇 Contacts</div>
    <div class="badge">💬 Conversations</div>
    <div class="badge">📊 Pipeline</div>
    <div class="badge">📅 Calendar</div>
    <div class="badge">⚡ Workflows</div>
  </div>
</div>
</body>
</html>
