#:schema node_modules/wrangler/config-schema.json
name = "kyra"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Assets (static files)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# R2 bucket for Next.js incremental cache (required by OpenNext)
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "kyra-next-cache"

# R2 bucket binding (uncomment if needed for direct access from frontend)
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "kyra-user-data"

# Environment variables that are safe to commit (non-secret)
[vars]
NEXT_PUBLIC_APP_NAME = "Kyra"
NEXT_PUBLIC_APP_URL = "https://kyra.conversionsystem.com"
NEXT_PUBLIC_SUPABASE_URL = "https://yaijdtsunxicuphrakcc.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhaWpkdHN1bnhpY3VwaHJha2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzc5MzksImV4cCI6MjA4NTg1MzkzOX0.PRYx0666tdykj9bvkDuN1kdknIiVjACpsxIixxre6Ow"
KYRA_USE_OPENCLAW = "false"
KYRA_USE_WORKER = "false"
KYRA_OPENCLAW_SKILLS = "false"
NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_live_O6KfQFjoTPr8xECnzSadOqgU"
STRIPE_PRICE_STARTER = "price_1SzEfEDr3LPJOIaM4eRAwHn7"
