name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# CI runs on every push + PR. Deploy runs only on push to main, after CI.
# Deploy uses the Vercel CLI with a scoped token (see repo secrets below).
#
# Required repo secrets:
#   VERCEL_TOKEN        — personal or team token with deploy scope
#   VERCEL_ORG_ID       — from `vercel link` → .vercel/project.json (orgId)
#   VERCEL_PROJECT_ID   — from `vercel link` → .vercel/project.json (projectId)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: CI (TypeScript + Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 9999

      - name: Tests
        run: npm test

  deploy:
    name: Deploy to Vercel (production) [DISABLED — use CLI only]
    needs: ci
    if: false  # NEVER auto-deploy from CI — use 'npx vercel --prod --yes' locally to control deploy count
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
