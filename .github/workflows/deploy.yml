name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# CI only — TypeScript + lint checks.
# Deployments are done via CLI (npx vercel --prod --yes) to avoid double builds.
# Previous workflow deployed on every push → doubled build minutes → $150/mo.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: CI (TypeScript + Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 9999
