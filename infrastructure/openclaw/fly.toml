# ============================================================================
# Fly.io Configuration — Kyra OpenClaw Gateway
#
# Runs a REAL OpenClaw instance that powers Kyra's AI agents.
# Replaces the old dumb chat-bridge.js proxy.
#
# Deploy: cd infrastructure/openclaw && fly deploy
# ============================================================================

app = 'kyra-gateway'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  NODE_OPTIONS = '--max-old-space-size=1024'
  BRIDGE_PORT = '3100'
  GATEWAY_PORT = '18789'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[mounts]
  source = 'openclaw_data'
  destination = '/root/.openclaw'

[[vm]]
  memory = '2048mb'
  cpu_kind = 'shared'
  cpus = 1
